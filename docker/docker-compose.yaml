services:
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --save "" --appendonly no

  neodm:
    build:
      context: ..
      dockerfile: docker/neodm.Dockerfile
    platform: linux/arm64
    ports:
      - "50051:50051"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

  robotos:
    build:
      context: ..
      dockerfile: docker/go.Dockerfile
    platform: linux/arm64
    depends_on:
      - neodm
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

  mcap-logger:
    build:
      context: ..
      dockerfile: docker/mcap-logger.Dockerfile
    platform: linux/arm64
    user: "0"
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379
      - MCAP_OUT_DIR=/recordings
    volumes:
      - mcap_recordings:/recordings
    restart: unless-stopped

  dashboard:
    build:
      context: ..
      dockerfile: docker/dashboard.Dockerfile
    platform: linux/arm64
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379
      - DASHBOARD_ADDR=:8080
      - STATIC_DIR=/frontend/dist
    ports:
      - "8080:8080"
    restart: unless-stopped

  foxglove-bridge:
    build:
      context: ..
      dockerfile: docker/foxglove-bridge.Dockerfile
    platform: linux/arm64
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379
      - FOXGLOVE_ADDR=:8765
    ports:
      - "8765:8765"
    restart: unless-stopped

volumes:
  mcap_recordings:
