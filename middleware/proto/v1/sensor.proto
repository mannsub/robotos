syntax = "proto3";

package robotos.v1;

option go_package = "github.com/mannsub/robotos/proto/v1";

// SensorData is streamed from hal-gateway to upper services at 25Hz
message SensorData {
  JointState joint_state = 1;
  IMU imu = 2;
  Battery battery = 3;
  ContactState contact = 4;
  int64 timestamp_us = 5; // Unix microseconds
}

message JointState {
  repeated float position = 1; // rad
  repeated float velocity = 2; // rad/s
  repeated float torque = 3;   // Nm
}

message IMU {
  float accel_x = 1; // m/s^2
  float accel_y = 2;
  float accel_z = 3;
  float gyro_x = 4; // rad/s
  float gyro_y = 5;
  float gyro_z = 6;
}

message Battery {
  float pct = 1;     // 0.0 ~ 100.0
  float voltage = 2; // V
  bool is_charging = 3;
}

message ContactState {
  bool touched = 1;
  bool is_held = 2; // posture estimation
  bool obstacle = 3;
  bool cliff = 4;
}